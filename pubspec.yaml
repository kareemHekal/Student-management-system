name: student_management_system
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter

  loader_overlay: ^4.0.4+1
  cupertino_icons: ^1.0.6
  firebase_auth: ^5.3.1
  provider: ^6.0.0
  connectivity_plus: ^6.0.5
  cloud_firestore: ^5.2.1
  flutter_slidable: ^4.0.0
  firebase_core: ^3.6.0
  google_fonts: ^8.1.0
  flutter_launcher_icons: ^0.14.1
  printing: ^5.13.4
  shared_preferences: ^2.5.4
  webview_flutter: ^4.13.1
  pdf: ^3.11.1
  animated_notch_bottom_bar: ^1.0.3
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  flutter_native_splash: ^2.4.1
  chips_choice: ^3.0.1
  easy_date_timeline: ^2.0.9
  bloc: ^9.0.0
  ai_barcode_scanner: ^7.1.0
  flutter_bloc: ^9.0.0
  http: ^1.6.0
  shimmer:
  flutter_advanced_drawer: ^1.5.0
  firebase_crashlytics: ^4.3.10

flutter_native_splash:
  color: "#D9EDBF"
  image: "assets/images/splash image.png"
  android_12:
    image: "assets/images/splash image.png"
    color: "#D9EDBF"
    icon_background_color: "#D9EDBF"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.2"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  min_sdk_android: 23
  image_path: "assets/images/app_logo.jpg"
  adaptive_icon_background: "#163c4a"
  adaptive_icon_foreground: "assets/images/app_logo.jpg"
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: NotoKufiArabic
      fonts:
        - asset: fonts/NotoKufiArabic-Regular.ttf

